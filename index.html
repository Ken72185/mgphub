<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCT Hub | Premium Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Teko:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #09090b;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(0, 255, 128, 0.15);
            --accent-neon: #00ff80; /* Neon Green Premium */
            --accent-val: #ff4655; /* Valorant Red */
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --font-main: 'Inter', sans-serif;
            --font-head: 'Teko', sans-serif;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-main); background-color: var(--bg-main); color: var(--text-primary); line-height: 1.6; overflow-x: hidden; }

        /* Navbar Modern */
        .navbar { position: sticky; top: 0; z-index: 100; background: rgba(9, 9, 11, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--border-glass); }
        .nav-container { display: flex; justify-content: space-between; align-items: center; padding: 1rem 5%; max-width: 1400px; margin: 0 auto; }
        .logo h1 { font-family: var(--font-head); font-weight: 700; font-size: 2.5rem; letter-spacing: 1px; margin: 0; line-height: 1; }
        .logo span { color: var(--accent-neon); text-shadow: 0 0 10px rgba(0,255,128,0.4); }

        /* Nav Tabs */
        .nav-tabs { display: flex; justify-content: center; gap: 3rem; padding: 0 5%; border-top: 1px solid rgba(255,255,255,0.05); overflow-x: auto; }
        .tab-btn { background: none; border: none; color: var(--text-secondary); padding: 1rem 0; cursor: pointer; font-weight: 600; font-family: var(--font-head); font-size: 1.2rem; letter-spacing: 1px; position: relative; transition: var(--transition); }
        .tab-btn:hover, .tab-btn.active { color: var(--accent-neon); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--accent-neon); box-shadow: 0 -2px 10px rgba(0,255,128,0.5); }

        .container { max-width: 1400px; margin: 2rem auto; padding: 0 5%; min-height: 70vh; }
        
        /* Match Cards */
        .match-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
        .match-card { background: var(--bg-card); backdrop-filter: blur(12px); border: 1px solid var(--border-glass); border-radius: 12px; padding: 1.5rem; transition: var(--transition); position: relative; overflow: hidden; }
        .match-card:hover { border-color: var(--accent-neon); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,255,128,0.1); }
        
        .league-name { font-size: 0.75rem; color: var(--accent-neon); text-transform: uppercase; font-weight: 800; letter-spacing: 1px; margin-bottom: 1rem; }
        .teams-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .team { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; width: 40%; }
        .team img { width: 50px; height: 50px; object-fit: contain; }
        .team-name { font-weight: 600; font-size: 1.1rem; text-align: center; }
        .vs { font-family: var(--font-head); font-size: 1.5rem; color: var(--text-secondary); }
        
        .match-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1rem; font-size: 0.85rem; }
        .badge.live { background: rgba(255, 70, 85, 0.2); color: var(--accent-val); border: 1px solid var(--accent-val); padding: 0.2rem 0.8rem; border-radius: 20px; font-weight: bold; animation: pulse 2s infinite; }
        .badge.upcoming { background: rgba(0, 255, 128, 0.1); color: var(--accent-neon); padding: 0.2rem 0.8rem; border-radius: 20px; font-weight: bold; }

        /* BRACKET SYSTEM CSS */
        .bracket-container { display: flex; gap: 2rem; overflow-x: auto; padding: 2rem 0; align-items: center; justify-content: center; }
        .bracket-round { display: flex; flex-direction: column; justify-content: space-around; gap: 2rem; }
        .bracket-match { background: var(--bg-card); border: 1px solid var(--border-glass); border-radius: 8px; width: 200px; padding: 0.5rem; position: relative; }
        .bracket-match::after { content: ''; position: absolute; right: -2rem; top: 50%; width: 2rem; height: 2px; background: var(--border-glass); }
        .bracket-round:last-child .bracket-match::after { display: none; } /* Hilangkan garis di final */
        .b-team { display: flex; justify-content: space-between; padding: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .b-team:last-child { border-bottom: none; }
        .b-score { font-weight: 800; color: var(--accent-neon); }
        .b-winner { color: var(--accent-neon); }

        .skeleton { background: linear-gradient(90deg, var(--bg-card) 25%, rgba(0,255,128,0.05) 50%, var(--bg-card) 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 8px; height: 150px; width: 100%; }

        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 70, 85, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 70, 85, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 70, 85, 0); } }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <div class="logo"><h1>VCT<span>HUB</span></h1></div>
        </div>
        <nav class="nav-tabs">
            <button class="tab-btn active" data-target="schedule">Schedules</button>
            <button class="tab-btn" data-target="tournaments">Tournaments</button>
            <button class="tab-btn" data-target="bracket">Playoff Brackets</button>
        </nav>
    </header>

    <main class="container">
        <div id="contentArea"></div>
    </main>

    <script>
        class ValorantHub {
            constructor() {
                // HenrikDev API: Sangat stabil, auto-update, no auth required
                this.apiBase = 'https://api.henrikdev.xyz/valorant/v1';
                
                this.currentView = 'schedule';
                this.contentArea = document.getElementById('contentArea');
                this.tabs = document.querySelectorAll('.tab-btn');
                
                this.init();
            }

            init() {
                this.bindEvents();
                this.loadView(this.currentView);
            }

            bindEvents() {
                this.tabs.forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        this.tabs.forEach(t => t.classList.remove('active'));
                        e.target.classList.add('active');
                        this.currentView = e.target.dataset.target;
                        this.loadView(this.currentView);
                    });
                });
            }

            async fetchAPI(endpoint) {
                try {
                    const response = await fetch(`${this.apiBase}/${endpoint}`);
                    if (!response.ok) throw new Error('API Error');
                    const json = await response.json();
                    return json.data;
                } catch (error) {
                    console.error(error);
                    return null;
                }
            }

            async loadView(view) {
                this.contentArea.innerHTML = `<div class="match-grid">${Array(6).fill('<div class="skeleton"></div>').join('')}</div>`;
                
                switch(view) {
                    case 'schedule': await this.renderSchedule(); break;
                    case 'tournaments': await this.renderTournaments(); break;
                    case 'bracket': this.renderDemoBracket(); break;
                }
            }

            async renderSchedule() {
                // Narik data match resmi VCT
                const matches = await this.fetchAPI('esports/schedule');
                
                if (!matches || matches.length === 0) {
                    this.contentArea.innerHTML = `<p style="text-align:center; color: var(--text-secondary);">No upcoming matches found in the API.</p>`;
                    return;
                }

                // Filter out matches without team data
                const validMatches = matches.filter(m => m.match.teams && m.match.teams.length === 2).slice(0, 12);

                const html = validMatches.map(m => {
                    const team1 = m.match.teams[0];
                    const team2 = m.match.teams[1];
                    const matchDate = new Date(m.date);
                    
                    // Logic penentuan status (Live/Upcoming)
                    const isLive = m.state === 'inProgress';
                    const badgeClass = isLive ? 'live' : 'upcoming';
                    const badgeText = isLive ? 'LIVE NOW' : matchDate.toLocaleDateString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });

                    return `
                        <div class="match-card">
                            <div class="league-name"><i class="fas fa-trophy"></i> ${m.league.name}</div>
                            <div class="teams-container">
                                <div class="team">
                                    <img src="${team1.icon || 'https://via.placeholder.com/50/09090b/00ff80?text=T1'}" alt="${team1.name}">
                                    <div class="team-name">${team1.code || team1.name}</div>
                                </div>
                                <div class="vs">VS</div>
                                <div class="team">
                                    <img src="${team2.icon || 'https://via.placeholder.com/50/09090b/00ff80?text=T2'}" alt="${team2.name}">
                                    <div class="team-name">${team2.code || team2.name}</div>
                                </div>
                            </div>
                            <div class="match-footer">
                                <span>BO${m.match.game_type || '3'}</span>
                                <span class="badge ${badgeClass}">${badgeText}</span>
                            </div>
                        </div>
                    `;
                }).join('');

                this.contentArea.innerHTML = `<div class="match-grid">${html}</div>`;
            }

            async renderTournaments() {
                this.contentArea.innerHTML = `<div class="match-card" style="text-align:center; border-color: var(--accent-val);">
                    <h2 style="font-family: var(--font-head); font-size: 2rem; color: var(--text-primary);">VCT 2026 SEASON OFFICIALLY ONGOING</h2>
                    <p style="color: var(--text-secondary);">Check Liquipedia for full tier 2/3 circuit details. API focuses on Tier 1 VCT franchised leagues.</p>
                </div>`;
            }

            renderDemoBracket() {
                // Fitur Bracket murni CSS Flexbox, ini cara world-class dev bikin visualisasi tree
                this.contentArea.innerHTML = `
                    <h2 style="font-family: var(--font-head); font-size: 2rem; text-align: center; margin-bottom: 2rem; letter-spacing: 1px;">MASTERS <span style="color: var(--accent-neon);">PLAYOFFS</span></h2>
                    <div class="bracket-container">
                        <div class="bracket-round">
                            <div class="bracket-match">
                                <div class="b-team"><span class="b-winner">PRX</span> <span class="b-score">2</span></div>
                                <div class="b-team"><span>SEN</span> <span class="b-score">1</span></div>
                            </div>
                            <div class="bracket-match">
                                <div class="b-team"><span class="b-winner">FNC</span> <span class="b-score">2</span></div>
                                <div class="b-team"><span>GEN.G</span> <span class="b-score">0</span></div>
                            </div>
                        </div>
                        
                        <div class="bracket-round">
                            <div class="bracket-match" style="border-color: var(--accent-neon); box-shadow: 0 0 15px rgba(0,255,128,0.2);">
                                <div style="font-size: 0.7rem; color: var(--accent-neon); text-align: center; margin-bottom: 5px; font-weight: bold;">GRAND FINAL</div>
                                <div class="b-team"><span class="b-winner">PRX</span> <span class="b-score">3</span></div>
                                <div class="b-team"><span>FNC</span> <span class="b-score">2</span></div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', () => new ValorantHub());
    </script>
</body>
</html>
